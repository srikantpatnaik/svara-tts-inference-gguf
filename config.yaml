server:
  host: "0.0.0.0"
  port: 8000
  workers: 2
  max_queue_size: 100
  api_key: null
  cors_origins:
    - "*"
  web_enabled: true

llama_server:
  bin: "/path/to/llama-server"
  host: "127.0.0.1"
  port: 0
  model_path: "/path/to/model.gguf"
  args: "-c 4096 -ngl 99 -t 4"

model:
  max_tokens: 4096
  temperature: 0.7
  top_p: 0.9
  repetition_penalty: 1.1

audio:
  sample_rate: 24000

request_timeout: 300
